<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณ BMI</h2>

    <input type="number" id="weight" placeholder="น้ำหนัก (kg)">
    <input type="number" id="height" placeholder="ส่วนสูง (cm)">

    <button onclick="calculateBMI()">คำนวณ</button>

    <div id="result"></div>
</div>

<script>
function calculateBMI() {
    let weight = document.getElementById("weight").value;
    let height = document.getElementById("height").value;

    if (weight === "" || height === "") {
        document.getElementById("result").innerText = "กรุณากรอกข้อมูลให้ครบ";
        return;
    }

    height = height / 100; // แปลง cm เป็น m
    let bmi = weight / (height * height);
    let status = "";

    if (bmi < 18.5) {
        status = "ผอม";
    } else if (bmi < 23) {
        status = "ปกติ";
    } else if (bmi < 25) {
        status = "น้ำหนักเกิน";
    } else if (bmi < 30) {
        status = "อ้วน";
    } else {
        status = "อ้วนมาก";
    }

    document.getElementById("result").innerText =
        "BMI = " + bmi.toFixed(2) + " (" + status + ")";
}
</script>

</body>
</html>
